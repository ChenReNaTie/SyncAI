services:
  postgres:
    image: postgres:16-alpine
    container_name: syncai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SYNCAI_POSTGRES_DB:-syncai}
      POSTGRES_USER: ${SYNCAI_POSTGRES_USER:-syncai}
      POSTGRES_PASSWORD: ${SYNCAI_POSTGRES_PASSWORD:-syncai}
    ports:
      - "${SYNCAI_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SYNCAI_POSTGRES_USER:-syncai} -d ${SYNCAI_POSTGRES_DB:-syncai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: syncai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${SYNCAI_REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:

